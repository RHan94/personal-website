name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          extra: --ignore-re "assets/|css/|js/"
